name: Actualizar subastas BOE

on:
  schedule:
    - cron: '0 8 * * *'   # 8h UTC = 10h España (verano) / 9h (invierno)
  workflow_dispatch:       # permite lanzarlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        run: python boe_subastas.py

      - name: Publicar cambios
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'datos: actualizar subastas BOE'
          file_pattern: 'web/ informes/'
